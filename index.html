<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unique Cooperative Society</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --green:#1a5c35;--green-light:#2a7a4a;--green-dark:#0f3d22;
  --gold:#c8960c;--gold-light:#e8b018;--gold-pale:#fdf6e3;
  --cream:#f8f5ef;--white:#ffffff;--gray:#6b7280;--gray-light:#f3f4f6;
  --danger:#dc2626;--success:#16a34a;--info:#2563eb;--warn:#d97706;
  --border:#e2e8f0;--shadow:0 2px 12px rgba(0,0,0,0.09);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;background:var(--cream);color:#1e293b;min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--green-dark) 0%,var(--green) 60%,var(--green-light) 100%);padding:20px}
.login-card{background:var(--white);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:48px 44px;width:100%;max-width:440px;text-align:center}
.login-logo{width:100px;height:100px;object-fit:contain;margin-bottom:16px;border-radius:50%}
.login-card h1{font-size:1.5rem;color:var(--green-dark);line-height:1.3;margin-bottom:4px}
.tagline{color:var(--gray);font-size:0.85rem;margin-bottom:32px;font-weight:300}
.lc-group{margin-bottom:16px;text-align:left}
.lc-group label{display:block;font-size:0.82rem;font-weight:700;color:var(--green-dark);margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase}
.lc-group input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'Lato',sans-serif;font-size:0.95rem;transition:border 0.2s;background:var(--gray-light)}
.lc-group input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(26,92,53,0.12);background:white}
.btn-login{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:10px;font-family:'Lato',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s,transform 0.1s;margin-top:8px}
.btn-login:hover{background:var(--green-light);transform:translateY(-1px)}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.login-error{background:#fef2f2;border:1px solid #fca5a5;color:var(--danger);padding:10px 14px;border-radius:8px;font-size:0.88rem;margin-bottom:16px;display:none;text-align:left}
.login-hint{color:var(--gray);font-size:0.8rem;margin-top:16px}
/* APP SHELL */
#app{display:none}
.app-header{background:var(--green-dark);color:white;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 8px rgba(0,0,0,0.2);position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{width:38px;height:38px;object-fit:contain;border-radius:50%;background:white;padding:2px}
.header-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;line-height:1.2}
.header-sub{font-size:0.7rem;opacity:0.75;font-weight:300}
.header-right{display:flex;align-items:center;gap:12px}
.user-badge{background:rgba(255,255,255,0.15);border-radius:20px;padding:6px 14px;font-size:0.82rem;display:flex;align-items:center;gap:6px}
.user-role{background:var(--gold);color:var(--green-dark);padding:2px 7px;border-radius:10px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.btn-logout{background:transparent;border:1.5px solid rgba(255,255,255,0.4);color:white;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;transition:background 0.2s}
.btn-logout:hover{background:rgba(255,255,255,0.15)}
/* LAYOUT */
.app-layout{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:230px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0}
.nav-sec{padding:8px 16px 4px;font-size:0.7rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:0.9rem;color:#374151;transition:all 0.15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--gray-light);color:var(--green)}
.nav-item.active{background:var(--gold-pale);color:var(--green-dark);border-left-color:var(--gold);font-weight:700}
.nav-icon{font-size:1.1rem;width:22px;text-align:center}
.main{flex:1;padding:28px;overflow-y:auto}
/* CARDS */
.card{background:white;border-radius:14px;box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;border-bottom:1.5px solid var(--border);padding-bottom:14px}
.card-title{font-size:1.05rem;color:var(--green-dark)}
.page-title{font-size:1.6rem;color:var(--green-dark);margin-bottom:6px}
.page-sub{color:var(--gray);font-size:0.88rem;margin-bottom:24px}
/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:white;border-radius:14px;box-shadow:var(--shadow);padding:20px 22px;border-left:4px solid var(--green);display:flex;align-items:center;gap:16px}
.stat-card.gold{border-left-color:var(--gold)}.stat-card.info{border-left-color:var(--info)}.stat-card.warn{border-left-color:var(--warn)}.stat-card.danger{border-left-color:var(--danger)}
.si{font-size:2rem;line-height:1}
.sl{font-size:0.78rem;color:var(--gray);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.sv{font-size:1.4rem;font-family:'Playfair Display',serif;color:var(--green-dark);font-weight:700}
.stat-card.gold .sv{color:var(--gold)}.stat-card.info .sv{color:var(--info)}.stat-card.warn .sv{color:var(--warn)}.stat-card.danger .sv{color:var(--danger)}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.88rem}
thead th{background:var(--green-dark);color:white;padding:10px 14px;text-align:left;font-weight:700;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.04em}
thead th:first-child{border-radius:8px 0 0 8px}thead th:last-child{border-radius:0 8px 8px 0}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s}
tbody tr:hover{background:var(--gray-light)}
tbody td{padding:11px 14px;vertical-align:middle}
/* BADGE */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.74rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.badge-success{background:#dcfce7;color:#15803d}.badge-warn{background:#fef9c3;color:#92400e}
.badge-danger{background:#fef2f2;color:#b91c1c}.badge-info{background:#dbeafe;color:#1d4ed8}
.badge-gray{background:var(--gray-light);color:var(--gray)}
/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:0.8rem;font-weight:700;color:var(--green-dark);text-transform:uppercase;letter-spacing:0.04em}
.form-group input,.form-group select,.form-group textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Lato',sans-serif;font-size:0.93rem;background:var(--gray-light);transition:border 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--green);background:white}
.form-group textarea{resize:vertical;min-height:80px}
.form-note{font-size:0.78rem;color:var(--gray);font-style:italic}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:0.88rem;font-weight:700;transition:all 0.15s;letter-spacing:0.02em}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--green);color:white}.btn-primary:hover:not(:disabled){background:var(--green-light)}
.btn-gold{background:var(--gold);color:white}.btn-gold:hover:not(:disabled){background:var(--gold-light)}
.btn-danger{background:var(--danger);color:white}.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray)}.btn-ghost:hover:not(:disabled){border-color:var(--green);color:var(--green)}
.btn-sm{padding:5px 12px;font-size:0.8rem}.btn-full{width:100%;justify-content:center}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:white;border-radius:18px;padding:32px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,0.3);transform:scale(0.95);transition:transform 0.2s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:scale(1)}
.modal-title{font-size:1.25rem;color:var(--green-dark);margin-bottom:20px;padding-bottom:14px;border-bottom:1.5px solid var(--border)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* ALERTS */
.alert{padding:12px 16px;border-radius:9px;font-size:0.88rem;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.alert-success{background:#dcfce7;border:1px solid #86efac;color:#15803d}
.alert-danger{background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c}
.alert-info{background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8}
.alert-warn{background:#fef9c3;border:1px solid #fde68a;color:#92400e}
/* HISTORY */
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-meta{font-size:0.82rem;color:var(--gray);margin-top:2px}
.amt-cr{color:var(--success);font-weight:700}.amt-dr{color:var(--danger);font-weight:700}
/* ACCOUNT HERO */
.acc-hero{background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:16px;padding:28px;color:white;margin-bottom:24px;position:relative;overflow:hidden}
.acc-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;background:rgba(255,255,255,0.06);border-radius:50%}
.acc-hero::after{content:'';position:absolute;right:40px;bottom:-40px;width:130px;height:130px;background:rgba(255,255,255,0.04);border-radius:50%}
.ah-label{font-size:0.78rem;opacity:0.75;text-transform:uppercase;letter-spacing:0.07em;font-weight:700;margin-bottom:4px}
.ah-amount{font-size:2.2rem;font-family:'Playfair Display',serif;font-weight:700;margin-bottom:2px}
.ah-sub{font-size:0.82rem;opacity:0.7}
.ah-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px}
.ah-item{background:rgba(255,255,255,0.12);border-radius:10px;padding:14px 16px}
/* LOAN PURPOSE */
.purpose-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.purpose-card{border:2px solid var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all 0.15s;font-size:0.8rem}
.purpose-card:hover{border-color:var(--green);background:var(--gray-light)}
.purpose-card.selected{border-color:var(--green);background:var(--gold-pale);color:var(--green-dark)}
.purpose-icon{font-size:1.3rem;display:block;margin-bottom:3px}
/* PROGRESS */
.prog-bar{background:#e2e8f0;border-radius:20px;height:10px;margin:4px 0}
.prog-fill{background:var(--green);border-radius:20px;height:10px;transition:width 0.5s}
/* BACK BUTTON */
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;color:var(--gray);font-family:'Lato',sans-serif;font-size:0.84rem;font-weight:700;cursor:pointer;transition:all 0.15s;margin-bottom:18px}
.back-btn:hover{border-color:var(--green);color:var(--green);background:var(--gold-pale)}
/* PASSWORD STRENGTH */
.pw-bar{height:5px;border-radius:4px;margin-top:6px;transition:all 0.3s;background:var(--border)}
.pw-bar.weak{background:#ef4444;width:33%}.pw-bar.medium{background:#f59e0b;width:66%}.pw-bar.strong{background:var(--success);width:100%}
.pw-lbl{font-size:0.75rem;color:var(--gray);margin-top:4px}
/* SETTINGS */
.set-section{margin-bottom:28px}
.set-section-title{font-size:0.75rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.9rem}
.set-row:last-child{border-bottom:none}
.set-key{color:var(--gray);font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.set-val{font-weight:700;color:var(--green-dark)}
/* IMPORT */
.import-zone{border:2.5px dashed var(--border);border-radius:12px;padding:36px 24px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--gray-light);position:relative;margin-top:10px}
.import-zone:hover,.import-zone.over{border-color:var(--green);background:var(--gold-pale)}
.import-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.iz-icon{font-size:2.2rem;margin-bottom:8px}
.iz-title{font-weight:700;color:var(--green-dark);font-size:0.95rem;margin-bottom:4px}
.iz-sub{font-size:0.8rem;color:var(--gray)}
.import-preview{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:12px}
.import-preview table{font-size:0.8rem}
.import-preview thead th{font-size:0.72rem;padding:7px 10px}
.import-preview tbody td{padding:7px 10px}
.row-ok td:first-child::before{content:'✅ ';font-size:0.75rem}
.row-err{background:#fef2f2}.row-err td:first-child::before{content:'❌ ';font-size:0.75rem}
/* REPORTS */
.rpt-card{background:white;border-radius:14px;box-shadow:var(--shadow);padding:22px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.rpt-title{font-weight:700;font-size:0.97rem;color:var(--green-dark);margin-bottom:3px}
.rpt-sub{font-size:0.82rem;color:var(--gray)}
.rpt-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.exp-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:'Lato',sans-serif;font-size:0.82rem;font-weight:700;transition:all 0.15s;white-space:nowrap}
.exp-btn.csv{border-color:#16a34a;color:#15803d}.exp-btn.csv:hover{background:#dcfce7}
.exp-btn.xlsx{border-color:#1d4ed8;color:#1d4ed8}.exp-btn.xlsx:hover{background:#dbeafe}
/* LOAN CALCULATOR */
.loan-calc-box{background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:16px;padding:24px;color:white;margin-bottom:20px}
.loan-calc-box .lc-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:16px;opacity:0.95}
.lc-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.12);font-size:0.88rem}
.lc-row:last-child{border-bottom:none;padding-top:12px;margin-top:4px}
.lc-row.total{background:rgba(255,255,255,0.12);border-radius:8px;padding:10px 14px;margin-top:8px}
.lc-label{opacity:0.82}
.lc-value{font-weight:700;font-size:0.95rem}
.lc-value.big{font-size:1.2rem;font-family:'Playfair Display',serif}
.duration-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.18);border-radius:20px;padding:5px 14px;font-size:0.82rem;font-weight:700;margin-top:8px}
.eligibility-bar{background:rgba(255,255,255,0.15);border-radius:20px;height:8px;margin-top:6px}
.eligibility-fill{background:var(--gold-light);border-radius:20px;height:8px;transition:width 0.4s}
.loan-input-group{position:relative}
.loan-input-group input{padding-left:36px}
.loan-input-group::before{content:'₦';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray);font-weight:700;font-size:0.95rem;z-index:1}
.duration-tag{display:inline-block;background:var(--gold-pale);color:var(--green-dark);border:1.5px solid var(--gold);border-radius:8px;padding:6px 14px;font-size:0.85rem;font-weight:700;margin-top:8px}
.date-preview{background:var(--gray-light);border-radius:8px;padding:12px 14px;font-size:0.85rem;margin-top:8px}
.date-preview .dp-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)}
.date-preview .dp-row:last-child{border:none}
.dp-label{color:var(--gray);font-size:0.8rem}
.dp-val{font-weight:700;color:var(--green-dark)}
.extra-interest-note{background:#fef9c3;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:8px 12px;font-size:0.82rem;margin-top:8px;display:none}
/* ENHANCED LOAN CALCULATOR */
.loan-breakdown-enhanced{background:linear-gradient(135deg,var(--green-dark) 0%,#1a6640 50%,var(--green) 100%);border-radius:18px;padding:26px;color:white;margin-bottom:20px;box-shadow:0 8px 32px rgba(26,92,53,0.35)}
.lbe-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.2);padding-bottom:12px}
.lbe-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.lbe-item{background:rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,0.15);transition:background 0.2s}
.lbe-item:hover{background:rgba(255,255,255,0.16)}
.lbe-item.full{grid-column:1/-1}
.lbe-item.highlight{background:rgba(200,150,12,0.25);border-color:var(--gold-light)}
.lbe-label{font-size:0.74rem;opacity:0.75;text-transform:uppercase;letter-spacing:0.06em;font-weight:700;margin-bottom:4px}
.lbe-value{font-size:1.05rem;font-weight:700;font-family:'Playfair Display',serif}
.lbe-value.big{font-size:1.35rem}
.lbe-value.monthly{font-size:1.25rem;color:var(--gold-light)}
.lbe-divider{border:none;border-top:1px solid rgba(255,255,255,0.18);margin:12px 0}
.duration-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.dur-pill{padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:700;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);cursor:pointer;transition:all 0.15s;color:white}
.dur-pill.active{background:var(--gold);border-color:var(--gold-light);color:var(--green-dark)}
.dur-pill:hover:not(.active){background:rgba(255,255,255,0.2)}
.calc-pill-auto{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.18);border-radius:20px;padding:5px 16px;font-size:0.82rem;font-weight:700;margin-top:6px;border:1px solid rgba(255,255,255,0.3)}
.calc-pill-auto .pill-ico{font-size:1rem}
.elig-meter{margin-top:14px}
.elig-track{background:rgba(255,255,255,0.15);border-radius:20px;height:10px;overflow:hidden}
.elig-fill{background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:20px;height:10px;transition:width 0.5s ease;min-width:0}
.elig-labels{display:flex;justify-content:space-between;font-size:0.74rem;opacity:0.75;margin-top:5px}
.date-calc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;background:rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-top:0;border:1px solid rgba(255,255,255,0.12)}
.dcg-item .dcg-label{font-size:0.7rem;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.dcg-item .dcg-val{font-size:0.9rem;font-weight:700}
.charge-breakdown{background:rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.12)}
.cb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:0.87rem}
.cb-row:last-child{border-bottom:none;font-weight:700;font-size:0.95rem;margin-top:4px;padding-top:8px}
.cb-row.total-row{background:rgba(200,150,12,0.2);border-radius:8px;padding:8px 10px;margin-top:6px}
.cb-label{opacity:0.85}
.cb-val{font-weight:700}
.extra-rate-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,0.25);border:1px solid rgba(239,68,68,0.4);color:#fca5a5;border-radius:6px;padding:3px 10px;font-size:0.75rem;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .lbe-grid{grid-template-columns:1fr}
  .lbe-item.full{grid-column:1}
  .date-calc-grid{grid-template-columns:1fr}
  .duration-pills{gap:6px}
  .dur-pill{font-size:0.75rem;padding:5px 10px}
}
/* LOAN DETAIL CARD (member view) */
.loan-detail-card{background:white;border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.loan-detail-header{background:linear-gradient(135deg,var(--green-dark),var(--green));padding:20px 24px;color:white}
.ldh-id{font-size:0.78rem;opacity:0.75;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px}
.ldh-purpose{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.ldh-status{display:inline-block;padding:3px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;text-transform:uppercase;background:rgba(255,255,255,0.2);margin-top:6px}
.ldh-status.closed{background:rgba(255,255,255,0.35)}
.loan-detail-body{padding:20px 24px}
.loan-grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:18px}
.loan-stat{background:var(--gray-light);border-radius:10px;padding:12px 14px}
.ls-label{font-size:0.74rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px}
.ls-value{font-size:1rem;font-weight:700;color:var(--green-dark)}
.ls-value.danger{color:var(--danger)}
.ls-value.success{color:var(--success)}
.ls-value.gold{color:var(--gold)}
.breakdown-table{width:100%;border-collapse:collapse;font-size:0.86rem;margin-bottom:16px}
.breakdown-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.breakdown-table tr:last-child td{border:none;font-weight:700;font-size:0.95rem;background:var(--gold-pale)}
.breakdown-table .bt-label{color:var(--gray)}
.breakdown-table .bt-value{text-align:right;font-weight:700}
@media(max-width:700px){
  .sidebar{display:none}.main{padding:16px}
  .ah-grid{grid-template-columns:1fr}.purpose-grid{grid-template-columns:repeat(2,1fr)}
  .rpt-card{flex-direction:column;align-items:flex-start}
  .loan-grid-4{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

// ════════════════════════════════════════════════
//  STORAGE — every write persists to localStorage
// ════════════════════════════════════════════════
const DB = {
  get(k){ try{ return JSON.parse(localStorage.getItem('ucs_'+k)); }catch{ return null; } },
  set(k,v){ localStorage.setItem('ucs_'+k, JSON.stringify(v)); },
  del(k){ localStorage.removeItem('ucs_'+k); },
};

    {id:'S005',memberId:'M002',amount:80000,type:'deposit',date:'2024-11-15',note:'Monthly contribution',balance:280000},

function nextId(prefix){
  const c = DB.get('counters') || {};
  c[prefix] = (c[prefix]||0)+1;
  DB.set('counters',c);
  return prefix + String(c[prefix]).padStart(3,'0');
}

// ─── Getters ───
function getMembers(){ return DB.get('members') || []; }
function getRegularMembers(){ return getMembers().filter(m=>m.role!=='admin'); }
function getMemberById(id){ return getMembers().find(m=>m.id===id); }
function getSavings(memberId){ const s=DB.get('savings')||[]; return memberId?s.filter(x=>x.memberId===memberId):s; }
function getLoans(memberId){ const l=DB.get('loans')||[]; return memberId?l.filter(x=>x.memberId===memberId):l; }
function getLoanApps(memberId){ const a=DB.get('loanApps')||[]; return memberId?a.filter(x=>x.memberId===memberId):a; }
function getRepayments(filter={}){
  let r=DB.get('repayments')||[];
  if(filter.memberId) r=r.filter(x=>x.memberId===filter.memberId);
  if(filter.loanId)   r=r.filter(x=>x.loanId===filter.loanId);
  return r;
}
function memberBalance(mid){ return getSavings(mid).reduce((a,s)=>a+(s.type='deposit'?+s.amount:-+s.amount),0); }
function memberLoanBal(mid){ return getLoans(mid).filter(l=>l.status==='approved').reduce((a,l)=>a+ +l.balance,0); }

// ════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════
let currentUser = null;
try{ currentUser = JSON.parse(sessionStorage.getItem('ucs_session')); }catch{}

function doLogin(){
  const u = document.getElementById('li-user').value.trim();
  const p = document.getElementById('li-pass').value;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('li-btn');
  err.style.display='none';
  if(!u||!p){ showLoginErr('Enter username and password.'); return; }
  const member = getMembers().find(m=>m.username===u && m.password===p);
  if(!member){ showLoginErr('Invalid username or password.'); return; }
  if(member.status==='suspended'){ showLoginErr('Account suspended. Contact admin.'); return; }
  currentUser = member;
  sessionStorage.setItem('ucs_session', JSON.stringify(member));
  document.getElementById('login-error').style.display='none';
  startApp();
}
function showLoginErr(msg){
  const e=document.getElementById('login-error');
  e.textContent=msg; e.style.display='block';
}
function doLogout(){
  currentUser=null; sessionStorage.removeItem('ucs_session');
  pageHistory=[]; currentPage='';
  document.getElementById('app').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('li-user').value='';
  document.getElementById('li-pass').value='';
}
function startApp(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hdr-name').textContent = currentUser.name;
  document.getElementById('hdr-role').textContent = currentUser.role==='admin'?'Admin':'Member';
  buildSidebar();
  navigate(currentUser.role==='admin'?'admin-overview':'member-overview');
}

//  NAVIGATION
// ════════════════════════════════════════════════
let pageHistory=[], currentPage='';
const NAV_IDX = {
  'admin-overview':0,'admin-members':1,'admin-savings':2,'admin-loans':3,
  'admin-active-loans':4,'admin-repayments':5,'admin-reports':6,'admin-settings':7,
  'member-overview':0,'member-savings':1,'member-loans':2,'member-apply':3,'member-settings':4
};
const PAGES = {
  'admin-overview':pgAdminOverview,'admin-members':pgAdminMembers,
  'admin-savings':pgAdminSavings,'admin-loans':pgAdminLoans,
  'admin-active-loans':pgAdminActiveLoans,'admin-repayments':pgAdminRepayments,
  'admin-reports':pgAdminReports,'admin-settings':pgSettings,
  'member-overview':pgMemberOverview,'member-savings':pgMemberSavings,
  'member-loans':pgMemberLoans,'member-apply':pgMemberApply,'member-settings':pgSettings,
};
function navigate(page, push=true){
  if(push && currentPage && currentPage!==page){ pageHistory.push(currentPage); if(pageHistory.length>30) pageHistory.shift(); }
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const items=document.querySelectorAll('.nav-item');
  const idx=NAV_IDX[page]; if(idx!==undefined && items[idx]) items[idx].classList.add('active');
  const mc=document.getElementById('main');
  const back = pageHistory.length>0 ? `<button class="back-btn" onclick="goBack()">&#8592; Back</button><br>` : '';
  try{ mc.innerHTML = back + (PAGES[page] ? PAGES[page]() : '<p>Page not found.</p>'); }
  catch(e){ mc.innerHTML = back + `<div class="alert alert-danger">Error: ${e.message}</div>`; console.error(e); }
}
function goBack(){ if(pageHistory.length){ navigate(pageHistory.pop(), false); } }

const fmt = n => '₦' + Number(n||0).toLocaleString('en-NG');

function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d+'T12:00:00').toLocaleDateString('en-NG',{year:'numeric',month:'short',day:'numeric'}); }
  catch{ return d; }

function badgeStatus(s){
  const map={active:'success',inactive:'gray',suspended:'danger'};
  return `<span class="badge badge-${map[s]||'gray'}">${s}</span>`;
}

function pgAdminOverview(){
  const members = getRegularMembers();
  const savings = DB.get('savings')||[];
  const loans   = (DB.get('loans')||[]).filter(l=>l.status==='approved');
  const apps    = (DB.get('loanApps')||[]).filter(a=>a.status==='pending');
  const totalSav  = savings.reduce((a,s)=>a+(s.type==='deposit'?+s.amount:-+s.amount),0);
  const totalLoan = (DB.get('loans')||[]).reduce((a,l)=>a+ +l.amount,0);
  const outstanding = loans.reduce((a,l)=>a+ +l.balance,0);
  return `<h1 class="page-title">Overview</h1>
  <p class="page-sub">Welcome, ${currentUser.name}. Here's your cooperative at a glance.</p>
  <div class="stats-grid">

    <div class="stat-card warn"><div class="si">⏳</div><div><div class="sl">Outstanding</div><div class="sv">${fmt(outstanding)}</div></div></div>
    <div class="stat-card danger"><div class="si">📋</div><div><div class="sl">Pending Apps</div><div class="sv">${apps.length}</div></div></div>
  </div>
  ${apps.length?`<div class="card"><div class="card-header"><h3 class="card-title">⚡ Pending Applications</h3>
  <button class="btn btn-primary btn-sm" onclick="navigate('admin-loans')">View All</button></div>
  <div class="table-wrap"><table><thead><tr><th>Member</th><th>Amount</th><th>Purpose</th><th>Date</th></tr></thead><tbody>

function pgAdminLoans(){
  const apps    = DB.get('loanApps')||[];
  const pending = apps.filter(a=>a.status==='pending');
  const done    = apps.filter(a=>a.status!=='pending');
  return `<h1 class="page-title">Loan Applications</h1>
  <p class="page-sub">Review and process member loan applications.</p>
  ${pending.length ? `<div class="card"><div class="card-header"><h3 class="card-title">⏳ Pending (${pending.length})</h3></div>
  <div class="table-wrap"><table><thead><tr><th>Date</th><th>Member</th><th>Amount</th><th>Interest</th><th>Bank Charge</th><th>Total Repay</th><th>Monthly</th><th>Duration</th><th>Purpose</th><th>Action</th></tr></thead><tbody>
  ${pending.map(a=>{
    const rate = a.rate||8;
    const interest = a.interest||(a.amount*(rate/100));
    const bankCharge = a.bankCharge||(a.amount*0.002);
    const totalRep = a.totalRepayment||(a.amount+interest+bankCharge);
    const monthly = a.monthlyRepayment||(totalRep/(a.months||3));
    return `<tr>
    <td>${fmtDate(a.date)}</td><td><strong>${getMemberById(a.memberId)?.name||a.memberId}</strong></td>
    <td>${fmt(a.amount)}</td>
    <td>${fmt(interest)} <span style="font-size:0.74rem;color:var(--gray)">(${rate}%)</span></td>
    <td>${fmt(bankCharge)} <span style="font-size:0.74rem;color:var(--gray)">(0.2%)</span></td>
    <td style="font-weight:700;color:var(--green-dark)">${fmt(totalRep)}</td>
    <td>${fmt(monthly)}</td>
    <td>${a.months} mo.</td><td>${a.purpose}</td>
    <td style="display:flex;gap:6px">
      <button class="btn btn-primary btn-sm" onclick="processLoanApp('${a.id}','approved')">✓ Approve</button>
      <button class="btn btn-danger btn-sm" onclick="processLoanApp('${a.id}','rejected')">✗ Decline</button>
    </td></tr>`;}).join('')}
  </tbody></table></div></div>` : `<div class="alert alert-info">✅ No pending applications.</div>`}
  ${done.length ? `<div class="card"><div class="card-header"><h3 class="card-title">📁 Processed</h3></div>
  <div class="table-wrap"><table><thead><tr><th>Date</th><th>Member</th><th>Amount</th><th>Total Repay</th><th>Purpose</th><th>Status</th></tr></thead><tbody>
  ${[...done].reverse().map(a=>{
    const rate = a.rate||8;
    const interest = a.interest||(a.amount*(rate/100));
    const bankCharge = a.bankCharge||(a.amount*0.002);
    const totalRep = a.totalRepayment||(a.amount+interest+bankCharge);
    return `<tr><td>${fmtDate(a.date)}</td><td>${getMemberById(a.memberId)?.name||a.memberId}</td>
    <td>${fmt(a.amount)}</td><td>${fmt(totalRep)}</td><td>${a.purpose}</td>
    <td><span class="badge badge-${a.status==='approved'?'success':'danger'}">${a.status}</span></td></tr>`;}).join('')}
  </tbody></table></div></div>` : ''}`;
}

function pgAdminActiveLoans(){
  const loans   = (DB.get('loans')||[]).filter(l=>l.status==='approved');
  const allLoans = DB.get('loans')||[];
  const disbursed = allLoans.reduce((a,l)=>a+ +l.amount,0);
  const outstanding = loans.reduce((a,l)=>a+ +l.balance,0);
  return `<h1 class="page-title">Active Loans</h1>
  <p class="page-sub">Track all approved active loan accounts.</p>
  <div class="stats-grid">
    <div class="stat-card info"><div class="si">🏦</div><div><div class="sl">Disbursed</div><div class="sv">${fmt(disbursed)}</div></div></div>
    <div class="stat-card warn"><div class="si">⏳</div><div><div class="sl">Outstanding</div><div class="sv">${fmt(outstanding)}</div></div></div>
    <div class="stat-card"><div class="si">📋</div><div><div class="sl">Active Loans</div><div class="sv">${loans.length}</div></div></div>
  </div>
  <div class="card"><div class="card-header"><h3 class="card-title">Active Loan Accounts</h3></div>
  <div class="table-wrap"><table><thead><tr><th>Loan ID</th><th>Member</th><th>Principal</th><th>Interest (${8}%)</th><th>Bank Charge</th><th>Total Repay</th><th>Monthly</th><th>Start</th><th>End</th><th>Progress</th><th>Action</th></tr></thead><tbody>
  ${loans.length ? loans.map(l=>{
    const interest = l.interest||(+l.amount*(+(l.rate||8)/100));
    const bankCharge = l.bankCharge||(+l.amount*0.002);
    const totalRep = l.totalRepayment||(+l.amount+interest+bankCharge);
    const monthly = l.monthlyRepayment||(totalRep/+l.months);
    const pct=Math.round(Math.max(0,(totalRep- +l.balance)/totalRep)*100);
    const mName=getMemberById(l.memberId)?.name||l.memberId;
    return `<tr>
      <td><code>${l.id}</code></td><td>${mName}</td>
      <td>${fmt(l.amount)}</td>
      <td>${fmt(interest)}</td>
      <td>${fmt(bankCharge)}</td>
      <td style="font-weight:700">${fmt(totalRep)}</td>
      <td>${fmt(monthly)}</td>
      <td style="font-size:0.82rem">${fmtDate(l.startDate)}</td>
      <td style="font-size:0.82rem">${l.endDate?fmtDate(l.endDate):'—'}</td>
      <td><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span style="font-size:0.75rem;color:var(--gray)">${pct}% repaid</span></td>
      <td><button class="btn btn-primary btn-sm" onclick="showRepaymentModal('${l.id}','${mName.replace(/'/g,"\'")}',${l.balance})">💳 Payment</button></td>
    </tr>`;
  }).join('') : '<tr><td colspan="11"><div class="empty-state"><p>No active loans.</p></div></td></tr>'}
  </tbody></table></div></div>`;
}

function pgAdminRepayments(){
  const repayments = DB.get('repayments')||[];
  const loans = (DB.get('loans')||[]).filter(l=>l.status==='approved');
  const total = repayments.reduce((a,r)=>a+ +r.amount,0);
  return `<h1 class="page-title">💳 Loan Repayments</h1>
  <p class="page-sub">Record and track all loan repayments from members.</p>
  <div class="stats-grid">
    <div class="stat-card gold"><div class="si">💳</div><div><div class="sl">Total Collected</div><div class="sv">${fmt(total)}</div></div></div>
    <div class="stat-card"><div class="si">🔢</div><div><div class="sl">Total Repayments</div><div class="sv">${repayments.length}</div></div></div>
  </div>
  <div class="card" style="margin-bottom:20px"><div class="card-header"><h3 class="card-title">Record New Repayment</h3></div>
  <p style="font-size:0.87rem;color:var(--gray);margin-bottom:16px">Select an active loan to record a payment.</p>
  ${loans.length ? `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">
  ${loans.map(l=>{
    const pct=Math.round(((+l.amount- +l.balance)/ +l.amount)*100);
    const mName=getMemberById(l.memberId)?.name||l.memberId;
    return `<div class="rep-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="font-weight:700;font-size:0.9rem">${mName}</div>
        <div style="font-size:0.78rem;color:var(--gray)">${l.id} · ${l.purpose}</div></div>
        <span class="badge badge-info">${fmt(l.balance)} left</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div style="font-size:0.75rem;color:var(--gray);margin:4px 0 10px">${pct}% of ${fmt(l.amount)}</div>
      <button class="btn btn-primary btn-sm btn-full" onclick="showRepaymentModal('${l.id}','${mName.replace(/'/g,"\'")}',${l.balance})">💳 Record Payment</button>
    </div>`;
  }).join('')}
  </div>` : '<div class="alert alert-info">No active loans to record payments against.</div>'}
  </div>
  <div class="card"><div class="card-header"><h3 class="card-title">📋 Repayment History</h3></div>
  <div class="table-wrap"><table><thead><tr><th>Date</th><th>Loan ID</th><th>Member</th><th>Amount Paid</th><th>Balance Before</th><th>Balance After</th><th>Note</th></tr></thead><tbody>
  ${repayments.length ? [...repayments].reverse().map(r=>`<tr>
    <td>${fmtDate(r.date)}</td><td><code>${r.loanId}</code></td>
    <td>${getMemberById(r.memberId)?.name||r.memberId}</td>
    <td class="amt-cr">+${fmt(r.amount)}</td>
    <td>${fmt(r.balanceBefore)}</td>
    <td class="${+r.balanceAfter===0?'amt-cr':''}">${+r.balanceAfter===0?'✅ FULLY PAID':fmt(r.balanceAfter)}</td>
    <td>${r.note||'—'}</td></tr>`).join('') : '<tr><td colspan="7"><div class="empty-state"><p>No repayments recorded yet.</p></div></td></tr>'}
  </tbody></table></div></div>`;
}

function selPurpose(el,val){
  document.querySelectorAll('.purpose-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('la-purpose').value=val;
}

// ── LOAN DURATION LOGIC ──
function getLoanDurationAndRate(amount){
  // Returns {months, extraRate, isChoice}
  if(amount <= 50000)    return {months:3,  extraRate:0, isChoice:false};
  if(amount <= 100000)   return {months:5,  extraRate:0, isChoice:false};
  if(amount <= 400000)   return {months:8,  extraRate:0, isChoice:false};
  if(amount <= 750000)   return {months:10, extraRate:0, isChoice:false};
  if(amount <= 1000000)  return {months:12, extraRate:0, isChoice:false};
  // Above 1M — user chooses 15, 18, or 24 months
  return {months:15, extraRate:0, isChoice:true};
}

function getExtraRateForChoice(months){
  // 15 months → +3%, 18 months → 0%, 24 months → +3%
  if(months==15) return 3;
  if(months==18) return 0;
  if(months==24) return 3;
  return 0;
}

function addMonthsToDate(dateStr, months){
  if(!dateStr) return '—';
  const d = new Date(dateStr);
  if(isNaN(d)) return '—';
  d.setMonth(d.getMonth() + months);
  return d.toISOString().split('T')[0];
}

function fmtDateFromStr(str){
  if(!str||str==='—') return '—';
  const d = new Date(str+'T00:00:00');
  if(isNaN(d)) return str;
  return d.toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'});
}

function selectDurPill(el, bal, maxLoan){
  document.querySelectorAll('.dur-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('la-months').value = el.dataset.months;
  loanCalcUpdate(bal, maxLoan);
}

function loanCalcUpdate(bal, maxLoan){
  const amtEl  = document.getElementById('la-amount');
  const amount = parseFloat(amtEl?.value)||0;
  const startDateEl = document.getElementById('la-start');
  const startDate = startDateEl?.value || today();

  // Eligibility bar (top)
  const eligBar = document.getElementById('elig-bar');
  const eligLbl = document.getElementById('elig-pct-lbl');
  if(amount > 0 && maxLoan > 0){
    const usedPct = Math.min(100, Math.round((amount/maxLoan)*100));
    if(eligBar){ eligBar.style.width = usedPct+'%'; eligBar.style.background = usedPct>100?'#ef4444':'';}
    if(eligLbl) eligLbl.textContent = `Using ${usedPct}% of your eligibility`;
  } else {
    if(eligBar) eligBar.style.width='0%';
    if(eligLbl) eligLbl.textContent='Enter an amount to see usage';
  }

  // Show/hide duration choice for >1M
  const choiceWrap = document.getElementById('duration-choice-wrap');
  const durInfo = getLoanDurationAndRate(amount);

  if(amount > 1000000){
    if(choiceWrap) choiceWrap.style.display='block';
    // Read chosen months from active pill
    const activePill = document.querySelector('.dur-pill.active');
    const chosenMonths = activePill ? parseInt(activePill.dataset.months) : 15;
    document.getElementById('la-months').value = chosenMonths;
  } else {
    if(choiceWrap) choiceWrap.style.display='none';
    if(amount > 0) document.getElementById('la-months').value = durInfo.months;
  }

  // Hide panel if no amount
  const breakdown = document.getElementById('loan-breakdown');
  if(!amount || amount < 1){ if(breakdown) breakdown.style.display='none'; return; }
  if(breakdown) breakdown.style.display='block';

  const months = parseInt(document.getElementById('la-months').value)||3;
  const extraRate = amount > 1000000 ? getExtraRateForChoice(months) : 0;
  const totalRate = 8 + extraRate; // base 8% + any extra

  // Calculations
  const interest   = amount * (totalRate/100);
  const bankCharge = amount * 0.002;   // 0.2%
  const total      = amount + interest + bankCharge;
  const monthly    = total / months;

  // Date calc
  const endDate = addMonthsToDate(startDate, months);

  // Duration badge
  const durBadge = document.getElementById('dur-badge-text');
  if(durBadge){
    if(amount > 1000000){
      durBadge.textContent = `${months} months (your choice)`;
    } else {
      durBadge.textContent = `${months} months (auto-assigned)`;
    }
  }

  // Extra rate note
  const extraNote = document.getElementById('extra-rate-note');
  if(extraNote) extraNote.style.display = extraRate>0?'block':'none';

  // Rate pct display
  const ratePct = document.getElementById('bc-rate-pct');
  if(ratePct) ratePct.textContent = totalRate;

  // Date cells
  const dcgStart = document.getElementById('dcg-start');
  const dcgEnd   = document.getElementById('dcg-end');
  const dcgDur   = document.getElementById('dcg-dur');
  if(dcgStart) dcgStart.textContent = fmtDateFromStr(startDate);
  if(dcgEnd)   dcgEnd.textContent   = fmtDateFromStr(endDate);
  if(dcgDur)   dcgDur.textContent   = `${months} month${months!==1?'s':''}`;

  // Charge breakdown
  if(document.getElementById('bc-principal')) document.getElementById('bc-principal').textContent = fmt(amount);
  if(document.getElementById('bc-interest'))  document.getElementById('bc-interest').textContent  = fmt(interest);
  if(document.getElementById('bc-bank'))      document.getElementById('bc-bank').textContent      = fmt(bankCharge);
  if(document.getElementById('bc-total'))     document.getElementById('bc-total').textContent     = fmt(total);
  if(document.getElementById('bc-monthly'))   document.getElementById('bc-monthly').textContent   = fmt(monthly);

  const monthlyNote = document.getElementById('bc-monthly-note');
  if(monthlyNote) monthlyNote.textContent = `${months} instalments × ${fmt(monthly)}`;

  // Eligibility usage bar inside breakdown
  if(maxLoan > 0){
    const usedPct2 = Math.min(100, Math.round((amount/maxLoan)*100));
    const eb2 = document.getElementById('elig-bar2');
    if(eb2){ eb2.style.width=usedPct2+'%'; eb2.style.background=usedPct2>100?'#ef4444':'';}
    const el2 = document.getElementById('elig-pct2');
    if(el2) el2.textContent = `${usedPct2}% of ${fmt(maxLoan)} used`;
    const er2 = document.getElementById('elig-remain2');
    if(er2) er2.textContent = `${fmt(Math.max(0,maxLoan-amount))} remaining`;
  }
}

function submitLoanApp(){
  const amount  = parseFloat(document.getElementById('la-amount').value);
  const months  = parseInt(document.getElementById('la-months').value);
  const purpose = document.getElementById('la-purpose').value;
  const note    = document.getElementById('la-note').value;
  const startDate = document.getElementById('la-start')?.value || today();
  const al = document.getElementById('loan-alert');
  const bal = memberBalance(currentUser.id);
  const maxLoan = bal * 2;

  if(!amount||amount<10000){ al.innerHTML='<div class="alert alert-danger">Minimum loan amount is ₦10,000.</div>'; return; }
  if(amount>maxLoan){ al.innerHTML=`<div class="alert alert-danger">Amount exceeds your eligibility of ${fmt(maxLoan)} (2× your savings of ${fmt(bal)}).</div>`; return; }
  if(!months||months<1){ al.innerHTML='<div class="alert alert-danger">Loan duration could not be determined.</div>'; return; }

  const extraRate  = amount > 1000000 ? getExtraRateForChoice(months) : 0;
  const totalRate  = 8 + extraRate;
  const interest   = amount * (totalRate/100);
  const bankCharge = amount * 0.002;
  const total      = amount + interest + bankCharge;
  const monthly    = total / months;
  const endDate    = addMonthsToDate(startDate, months);

  const apps = DB.get('loanApps')||[];
  apps.push({
    id: nextId('APP'), memberId: currentUser.id,
    amount, months, purpose, note, date: today(),
    startDate, endDate,
    rate: totalRate, bankCharge, interest, totalRepayment: total, monthlyRepayment: monthly,
    status:'pending'
  });
  DB.set('loanApps', apps);
  navigate('member-loans');
}

function processLoanApp(appId, status){
  const apps = DB.get('loanApps')||[];
  const idx = apps.findIndex(a=>a.id===appId);
  if(idx<0) return;
  apps[idx].status = status;
  DB.set('loanApps',apps);
  if(status==='approved'){
    const app = apps[idx];
    const loans = DB.get('loans')||[];
    const rate = app.rate || 8;
    const bankCharge = app.bankCharge || (app.amount * 0.002);
    const interest = app.interest || (app.amount * (rate/100));
    const totalRepayment = app.totalRepayment || (app.amount + interest + bankCharge);
    const monthlyRepayment = app.monthlyRepayment || (totalRepayment / (app.months||3));
    loans.push({
      id: nextId('L'), memberId: app.memberId,
      amount: app.amount, purpose: app.purpose,
      status:'approved', rate, months: app.months,
      startDate: app.startDate || today(),
      endDate: app.endDate || addMonthsToDate(app.startDate||today(), app.months||3),
      bankCharge, interest, totalRepayment, monthlyRepayment,
      balance: totalRepayment,
      note: app.note
    });
    DB.set('loans',loans);
  }
  navigate('admin-loans');
}

// ── REPAYMENT MODAL ──
function showRepaymentModal(loanId, memberName, currentBal){
  openModal(`💳 Record Repayment — ${memberName}`, `
    <div class="alert alert-info" style="margin-bottom:16px">
      Loan: <strong>${loanId}</strong> &nbsp;·&nbsp; Outstanding: <strong>${fmt(currentBal)}</strong>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Payment Amount (₦)</label>
        <input type="number" id="rp-amount" min="1" max="${currentBal}" placeholder="e.g. 50000" oninput="repPreview(${currentBal})"></div>
      <div class="form-group"><label>Payment Date</label>
        <input type="date" id="rp-date" value="${today()}"></div>
    </div>
    <div class="form-group mt-3"><label>Note (optional)</label>
      <input type="text" id="rp-note" placeholder="e.g. October instalment"></div>
    <div id="rp-preview" style="margin-top:12px"></div>
    <div id="rp-alert" style="margin-top:10px"></div>
  `,[
    {label:'Cancel',cls:'btn-ghost',action:closeModal},
    {label:'💳 Record Payment',cls:'btn-primary',action:()=>submitRepayment(loanId,currentBal)}
  ]);
}
function repPreview(bal){
  const amt=parseFloat(document.getElementById('rp-amount').value)||0;
  const pv=document.getElementById('rp-preview');
  if(!amt||amt<=0){ pv.innerHTML=''; return; }
  const after=Math.max(0,+bal-amt);
  const pct=Math.min(100,Math.round((1-(after/bal))*100));
  pv.innerHTML=`<div style="background:var(--gray-light);border-radius:8px;padding:12px 14px">
    <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:8px">
      <span>Balance after payment:</span>
      <strong class="${after===0?'amt-cr':'amt-dr'}">${after===0?'✅ FULLY PAID':fmt(after)}</strong>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>`;
}
function submitRepayment(loanId, currentBal){
  const amount = parseFloat(document.getElementById('rp-amount').value);
  const date   = document.getElementById('rp-date').value;
  const note   = document.getElementById('rp-note').value.trim();
  const al     = document.getElementById('rp-alert');
  if(!amount||amount<=0){ al.innerHTML='<div class="alert alert-danger">Enter a valid amount.</div>'; return; }
  if(!date){ al.innerHTML='<div class="alert alert-danger">Date is required.</div>'; return; }
  const loans = DB.get('loans')||[];
  const lIdx  = loans.findIndex(l=>l.id===loanId);
  if(lIdx<0){ al.innerHTML='<div class="alert alert-danger">Loan not found.</div>'; return; }
  const loan   = loans[lIdx];
  const before = parseFloat(loan.balance);
  const after  = Math.max(0, before - amount);
  const newStatus = after===0 ? 'closed' : 'approved';
  // Update loan balance
  loans[lIdx].balance = after;
  loans[lIdx].status  = newStatus;
  DB.set('loans', loans);
  // Record repayment
  const reps = DB.get('repayments')||[];
  reps.push({
    id: nextId('REP'),
    loanId, memberId: loan.memberId,
    amount: Math.min(amount, before),
    date, note,
    balanceBefore: before,
    balanceAfter:  after,
  });
  DB.set('repayments', reps);
  al.innerHTML='<div class="alert alert-success">✅ Payment recorded!</div>';
  setTimeout(()=>{ closeModal(); navigate('admin-repayments'); }, 1100);
}

function pwStrength(v,barId,lblId){
  const bar=document.getElementById(barId),lbl=document.getElementById(lblId);
  if(!bar||!lbl) return; bar.className='pw-bar';
  if(!v){ lbl.textContent=''; return; }
  const s=(/[A-Z]/.test(v)?1:0)+(/[0-9]/.test(v)?1:0)+(/[^A-Za-z0-9]/.test(v)?1:0)+(v.length>=8?1:0);
  if(s<=1){bar.classList.add('weak');lbl.textContent='Weak';}
  else if(s<=2){bar.classList.add('medium');lbl.textContent='Medium';}
  else{bar.classList.add('strong');lbl.textContent='Strong';}
}

function handleImport(file){
  if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  const al=document.getElementById('ip-alert');
  if(!['csv','xlsx','xls'].includes(ext)){al.innerHTML='<div class="alert alert-danger">CSV or Excel only.</div>';return;}
  const r=new FileReader();
  r.onload=e=>{
    try{
      let rows=[];
      if(ext==='csv') rows=parseCSV(e.target.result);
      else{
        if(typeof XLSX==='undefined'){al.innerHTML='<div class="alert alert-danger">Excel library not ready, refresh page.</div>';return;}
        const wb=XLSX.read(e.target.result,{type:'array'});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
      }
      processImportRows(rows);
    }catch(err){al.innerHTML=`<div class="alert alert-danger">Error: ${err.message}</div>`;}
  };
  if(ext==='csv') r.readAsText(file); else r.readAsArrayBuffer(file);
}
function parseCSV(text){
  const rows=[];
  for(const line of text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')){
    if(!line.trim()) continue;
    const row=[];let cur='';let q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
      else if(c===','&&!q){row.push(cur.trim());cur='';}
      else cur+=c;
    }
    row.push(cur.trim()); rows.push(row);
  }
  return rows;
}
function processImportRows(rows){
  const al=document.getElementById('ip-alert'),pw=document.getElementById('ipw');
  if(!rows||rows.length<2){al.innerHTML='<div class="alert alert-danger">File empty.</div>';pw.innerHTML='';return;}
  const hdrs=rows[0].map(h=>String(h).toLowerCase().trim().replace(/\s+/g,''));
  const ci={name:hdrs.indexOf('name'),username:hdrs.indexOf('username'),password:hdrs.indexOf('password'),
    phone:hdrs.indexOf('phone'),email:hdrs.indexOf('email'),joindate:hdrs.indexOf('joindate'),status:hdrs.indexOf('status')};
  if(ci.name<0||ci.username<0||ci.password<0){
    al.innerHTML='<div class="alert alert-danger">Missing required columns: name, username, password</div>';pw.innerHTML='';return;}
  const seen=new Set(); _importData=[];
  rows.slice(1).filter(r=>r.some(c=>String(c).trim())).forEach((r,i)=>{
    const g=k=>ci[k]>=0?String(r[ci[k]]||'').trim():'';
    const name=g('name'),user=g('username'),pass=g('password');
    let err='';
    if(!name) err='Missing name';
    else if(!user) err='Missing username';
    else if(!pass) err='Missing password';
    else if(pass.length<4) err='Password too short';
    else if(seen.has(user)) err='Duplicate username';
    if(!err) seen.add(user);
    _importData.push({row:i+2,name,username:user,password:pass,phone:g('phone'),email:g('email'),joinDate:g('joindate')||today(),status:g('status')||'active',error:err});
  });
  const valid=_importData.filter(r=>!r.error).length, inv=_importData.length-valid;
  al.innerHTML=`<div class="alert alert-${inv>0?'warn':'info'}" style="background:${inv>0?'#fef9c3':'#dbeafe'};border-color:${inv>0?'#fde68a':'#93c5fd'};color:${inv>0?'#92400e':'#1d4ed8'}">
    ${_importData.length} rows: <strong>${valid} valid</strong>${inv>0?`, ${inv} with errors (skipped)`:''}</div>`;
  pw.innerHTML=`<div class="import-preview"><table><thead><tr><th>Row</th><th>Name</th><th>Username</th><th>Phone</th><th>Status</th></tr></thead><tbody>
  ${_importData.map(r=>`<tr class="${r.error?'row-err':'row-ok'}">
    <td>${r.row}${r.error?`<br><span style="color:var(--danger);font-size:0.72rem">${r.error}</span>`:''}</td>
    <td>${r.name}</td><td>${r.username}</td><td>${r.phone||'—'}</td><td>${r.status}</td></tr>`).join('')}
  </tbody></table></div>`;
}
function doImportMembers(){
  const valid=_importData.filter(r=>!r.error);
  const al=document.getElementById('ip-alert');
  if(!valid.length){al.innerHTML='<div class="alert alert-danger">No valid rows to import.</div>';return;}
  const members=getMembers();
  const existUnames=new Set(members.map(m=>m.username));
  let inserted=0; const skipped=[];
  valid.forEach(r=>{
    if(existUnames.has(r.username)){skipped.push(r.username);return;}
    const id=nextId('M');
    members.push({id,name:r.name,username:r.username,password:r.password,phone:r.phone,email:r.email,joinDate:r.joinDate,status:r.status||'active',role:'member'});
    existUnames.add(r.username);
    inserted++;
  });
  DB.set('members',members);
  closeModal(); navigate('admin-members');
  setTimeout(()=>{
    const mc=document.getElementById('main');
    mc.insertAdjacentHTML('afterbegin',`<div class="alert alert-success" style="margin-bottom:16px">✅ Imported ${inserted} member(s).${skipped.length?` Skipped (duplicate): ${skipped.join(', ')}`:''}</div>`);
  },300);
}

function dlCSV(filename,rows){
  const csv=rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s}).join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=filename;a.click();
}
function dlXLSX(filename,sheets){
  if(typeof XLSX==='undefined'){alert('Excel library not loaded. Refresh and try again.');return;}
  const wb=XLSX.utils.book_new();
  Object.entries(sheets).forEach(([name,rows])=>{
    const ws=XLSX.utils.aoa_to_sheet(rows);
    const cols=rows[0]?rows[0].map((_,i)=>({wch:Math.max(...rows.map(r=>String(r[i]||'').length),10)})):[];
    ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb,ws,name.substring(0,31));
  });
  XLSX.writeFile(wb,filename);
}

function openModal(title,body,actions){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-actions').innerHTML=
    actions.map((a,i)=>`<button class="btn ${a.cls}" id="ma-${i}">${a.label}</button>`).join('');
  actions.forEach((a,i)=>document.getElementById(`ma-${i}`).addEventListener('click',a.action));
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalBg(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }
